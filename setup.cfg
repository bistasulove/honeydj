[mypy]
python_version = 3.12
plugins = mypy_django_plugin.main
strict = True
ignore_missing_imports = True

[mypy.plugins.django-stubs]
django_settings_module = honeydj.settings.local

# Tests are unannotated by design (pytest fixtures, factory-boy, parametrize).
# Don't require signatures, don't deep-check untyped bodies, and allow
# subclassing factory-boy's untyped base — but still verify that the symbols
# tests import actually exist.
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
check_untyped_defs = False
disallow_subclassing_any = False
disable_error_code = annotation-unchecked

[tool:ruff]
target-version = "py312"
line-length = 100
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501"]
